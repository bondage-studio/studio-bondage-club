name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # C++ server: the default distribution flavour per platform, x64 + arm64.
  #   Windows   fully static (static deps + static CRT, no OpenSSL: Schannel).
  #   Linux     static vcpkg deps; the C/C++ runtime (libstdc++/libgcc, glibc)
  #             and OpenSSL are the system's, linked dynamically. A fully-static
  #             flavour is built separately against musl (see build-linux-musl).
  #   macOS     static vcpkg deps + system OpenSSL (dynamic); libSystem is always
  #             dynamic (Apple ships no static libc), so the runtime can't be static.
  # arm64 is built natively on GitHub's ARM runners. Binaries are UPX-compressed
  # where the format is supported (Linux/Windows); skipped on macOS.
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Linux x64",     os: ubuntu-latest,      preset: default,              slug: linux-x64 }
          - { name: "Linux arm64",   os: ubuntu-24.04-arm,   preset: default,              slug: linux-arm64 }
          - { name: "macOS x64",     os: macos-26-intel,     preset: default,              slug: macos-x64 }
          - { name: "macOS arm64",   os: macos-latest,       preset: default,              slug: macos-arm64 }
          - { name: "Windows x64",   os: windows-latest,     preset: static-windows,       slug: windows-x64,   msvc_arch: x64 }
          - { name: "Windows arm64", os: windows-11-arm,     preset: static-windows-arm64, slug: windows-arm64, msvc_arch: arm64 }

    env:
      # Cache built vcpkg packages in the GitHub Actions cache (x-gha backend).
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4

      # Expose the tokens the vcpkg x-gha binary cache backend needs.
      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Ninja for the generator; libssl-dev provides the system OpenSSL the
      # binary links dynamically (vcpkg no longer builds OpenSSL off-Android).
      - name: Install Ninja + OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libssl-dev

      # macOS links the runner's preinstalled brew openssl@3 dynamically.
      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --no-progress -y

      # Put cl.exe / the MSVC toolchain on PATH so the Ninja generator finds it.
      # arch selects the x64 or ARM64 cross/native tools to match the runner.
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      # The server embeds web/dist (SBC_EMBED_WEB, enabled at configure below) so
      # the binary is self-contained. Build the panel first; EmbedWebAssets reads
      # it at build time and runs a python3 generator to emit the asset TU, so a
      # Python interpreter must be available on every platform in the matrix.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build web panel
        shell: bash
        working-directory: web
        run: |
          npm ci
          npm run build

      # Bootstrap vcpkg into ./.vcpkg at the manifest baseline, matching the
      # CMakePresets toolchain path. Manifest mode installs deps at configure time.
      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg .vcpkg
          baseline=$(node -p "require('./vcpkg.json')['builtin-baseline']")
          git -C .vcpkg checkout "$baseline"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./.vcpkg/bootstrap-vcpkg.bat -disableMetrics
          else
            ./.vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi

      # On macOS, point find_package(OpenSSL) at the brew keg (it's keg-only and
      # not on the default search path). Linux/Windows need no extra hint.
      - name: Configure
        shell: bash
        run: |
          extra=()
          if [ "$RUNNER_OS" = "macOS" ]; then
            extra+=("-DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)")
          fi
          cmake --preset ${{ matrix.preset }} -DSBC_EMBED_WEB=ON "${extra[@]}"

      - name: Build
        run: cmake --build build/${{ matrix.preset }}

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

      - name: Verify binary linkage
        shell: bash
        run: |
          bin="build/${{ matrix.preset }}/studio-bondage-club"
          case "$RUNNER_OS" in
            Linux)   ldd "$bin"     || true ;;
            macOS)   otool -L "$bin" || true ;;
            Windows) dumpbin //dependents "${bin}.exe" || true ;;
          esac

      # Best-effort UPX compression. Supported on Linux/Windows PE+ELF; the macOS
      # Mach-O packer breaks code signing / Gatekeeper so it is skipped there. If
      # the format is unsupported (e.g. Windows ARM64 PE) the binary ships as-is.
      - name: Compress binary with UPX
        if: runner.os != 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          bin="build/${{ matrix.preset }}/studio-bondage-club"
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y upx-ucl
          else
            choco install upx --no-progress -y
            bin="${bin}.exe"
          fi
          upx --best --lzma "$bin" || echo "UPX unsupported for this target — shipping uncompressed."

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: studio-bondage-club-${{ matrix.slug }}
          path: |
            build/${{ matrix.preset }}/studio-bondage-club
            build/${{ matrix.preset }}/studio-bondage-club.exe
          if-no-files-found: ignore

  # Fully-static Linux binary built against musl in an Alpine container: libc and
  # OpenSSL are linked statically (vcpkg `vendored-openssl` feature), so the
  # result is self-contained and runs on any distro. Each arch builds natively
  # (musl-static output still runs on the glibc host), so tests run too.
  build-linux-musl:
    name: Linux musl ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    container: alpine:3.20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64,   os: ubuntu-latest,    slug: linux-musl-x64 }

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      # vcpkg ships glibc-linked cmake/ninja; on musl force it to use ours (apk).
      VCPKG_FORCE_SYSTEM_BINARIES: "1"

    steps:
      # Native musl toolchain + build tools. gcompat/libstdc++ let the runner's
      # bundled (glibc) Node run the JS actions under musl. samurai provides the
      # `ninja` command. Mark the workspace a safe git dir for the root user.
      - name: Install toolchain (apk)
        shell: sh
        run: |
          apk add --no-cache \
            build-base cmake samurai git bash perl linux-headers python3 \
            curl zip unzip tar pkgconf upx file nodejs npm gcompat libstdc++
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Build the panel embedded into the (self-contained) musl binary. Uses the
      # container's apk nodejs/npm + python3 (not setup-node, which ships glibc).
      - name: Build web panel
        shell: bash
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg .vcpkg
          baseline=$(node -p "require('./vcpkg.json')['builtin-baseline']")
          git -C .vcpkg checkout "$baseline"
          ./.vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure
        shell: bash
        run: cmake --preset musl-static -DSBC_EMBED_WEB=ON

      - name: Build
        shell: bash
        run: cmake --build build/musl-static

      - name: Test
        shell: bash
        run: ctest --test-dir build/musl-static --output-on-failure

      - name: Verify fully static
        shell: bash
        run: file build/musl-static/studio-bondage-club

      - name: Compress binary with UPX
        continue-on-error: true
        shell: bash
        run: upx --best --lzma build/musl-static/studio-bondage-club || echo "UPX skipped."

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: studio-bondage-club-${{ matrix.slug }}
          path: build/musl-static/studio-bondage-club
          if-no-files-found: error

  build-desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Linux desktop x64",   os: ubuntu-latest,    slug: linux-x64 }
          - { name: "Linux desktop arm64", os: ubuntu-24.04-arm, slug: linux-arm64 }

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      # Pinned CEF build (platform slug is appended per-arch by DownloadCEF.cmake).
      CEF_VERSION: "144.0.28+ga64d412+chromium-144.0.7559.255"

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ninja generator, system OpenSSL for sbc_core, libx11-dev for the lone
      # entry in CEF_STANDARD_LIBS the client links against, and libdbus-1-dev
      # (+ pkg-config to detect it) for the preferred D-Bus notification backend.
      # Without libdbus-1-dev the build still succeeds but silently falls back to
      # the notify-send backend; installing it keeps remote builds in sync with
      # local ones (the dbus_notifier path compiled in).
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build libssl-dev libx11-dev libdbus-1-dev pkg-config

      # The server embeds web/dist (SBC_EMBED_WEB), so it must exist before the
      # C++ build runs. Build it here, like the Android job does.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web panel
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg .vcpkg
          baseline=$(node -p "require('./vcpkg.json')['builtin-baseline']")
          git -C .vcpkg checkout "$baseline"
          ./.vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure
        run: cmake --preset linux-desktop -DCEF_VERSION="$CEF_VERSION"

      - name: Build
        run: cmake --build build/linux-desktop

      - name: Verify staging
        shell: bash
        run: |
          set -euo pipefail
          cd build/linux-desktop/desktop
          for f in studio-bondage-club-desktop libcef.so icudtl.dat resources.pak v8_context_snapshot.bin; do
            test -f "$f" || { echo "missing staged runtime file: $f"; exit 1; }
          done
          test -d locales || { echo "missing locales/"; exit 1; }
          ldd studio-bondage-club-desktop || true
          echo "Staging OK"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          src=build/linux-desktop/desktop
          out="$RUNNER_TEMP/sbc-desktop"
          mkdir -p "$out/locales"
          cp "$src/studio-bondage-club-desktop" "$out/"
          cp "$src"/*.so "$src"/*.so.* "$src/chrome-sandbox" "$out/"
          cp "$src"/*.pak "$src/icudtl.dat" "$src"/*.bin "$src"/vk_swiftshader_icd.json "$out/"
          cp "$src"/locales/* "$out/locales/"
          # --strip-unneeded keeps exported (dynamically linked) symbols intact.
          strip --strip-unneeded "$out"/*.so "$out"/*.so.* 2>/dev/null || true
          tar -czf "$RUNNER_TEMP/studio-bondage-club-desktop-${{ matrix.slug }}.tar.gz" -C "$out" .
          ls -lh "$RUNNER_TEMP/studio-bondage-club-desktop-${{ matrix.slug }}.tar.gz"

      - name: Upload desktop client
        uses: actions/upload-artifact@v4
        with:
          name: studio-bondage-club-desktop-${{ matrix.slug }}
          path: ${{ runner.temp }}/studio-bondage-club-desktop-${{ matrix.slug }}.tar.gz
          if-no-files-found: error

  # React admin panel: type-check + production build.
  web:
    name: Web panel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Upload web/dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  # Android app: embeds the server core (built per-ABI via vcpkg + NDK) and the
  # web panel. Two engine flavors are built: `system` (device WebView) and
  # `gecko` (bundled GeckoView).
  android:
    name: Android APK
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      # 'true' only when the signing secret is configured.
      SIGN_APK: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Node builds web/dist (driven by the buildWebAssets Gradle task); python3
      # (preinstalled on the runner) generates the embedded-asset translation unit.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager --install "platforms;android-36" "build-tools;35.0.0" "ndk;26.3.11579264" "cmake;3.22.1"

      # Bootstrap vcpkg into ./.vcpkg at the manifest baseline (the Android shim
      # toolchain chainloads it onto the NDK). Manifest deps build per ABI.
      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg .vcpkg
          baseline=$(node -p "require('./vcpkg.json')['builtin-baseline']")
          git -C .vcpkg checkout "$baseline"
          ./.vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Decode release keystore
        if: env.SIGN_APK == 'true'
        shell: bash
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      # Builds both engine flavors (assembleRelease covers every flavor of the
      # release build type): system (device WebView) and gecko (bundled GeckoView).
      - name: Build release APKs (arm64-v8a)
        working-directory: android
        env:
          SBC_KEYSTORE_FILE: ${{ env.SIGN_APK == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          SBC_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SBC_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SBC_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon -PsbcAbi=arm64-v8a

      - name: Upload system-WebView APK
        uses: actions/upload-artifact@v4
        with:
          name: studio-bondage-club-android-system-arm64
          path: android/app/build/outputs/apk/system/release/*.apk
          if-no-files-found: error

      - name: Upload GeckoView APK
        uses: actions/upload-artifact@v4
        with:
          name: studio-bondage-club-android-gecko-arm64
          path: android/app/build/outputs/apk/gecko/release/*.apk
          if-no-files-found: error

  release-nightly:
    name: Publish nightly release
    needs: [build, build-linux-musl, build-desktop, android]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage versioned assets
        run: |
          set -euo pipefail
          ver="$(date -u +%Y%m%d)-$(echo '${{ github.sha }}' | cut -c1-7)"
          mkdir -p dist
          shopt -s nullglob
          for d in artifacts/*/; do
            slug="$(basename "$d")"
            [ "$slug" = "web-dist" ] && continue
            for f in "$d"*; do
              [ -f "$f" ] || continue
              case "$(basename "$f")" in
                *.exe)    ext=".exe" ;;
                *.apk)    ext=".apk" ;;
                *.tar.gz) ext=".tar.gz" ;;
                *)        ext="" ;;
              esac
              cp "$f" "dist/${slug}-${ver}${ext}"
            done
          done
          echo "Assets to publish:"
          ls -lh dist

      - name: Publish to rolling nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ver="$(date -u +%Y-%m-%d) (${GITHUB_SHA})"
          # Drop the old nightly release + tag so only the latest assets remain.
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly dist/* \
            --prerelease \
            --title "Nightly build" \
            --notes "Rolling build of \`main\` — ${ver}. Assets are versioned by build date + commit hash." \
            --target "${GITHUB_SHA}"
