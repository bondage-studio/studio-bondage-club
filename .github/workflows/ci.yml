name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # C++ server: build + unit tests across platforms and linkage flavours.
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Linux · default",   os: ubuntu-latest,  preset: default }
          - { name: "Linux · static",    os: ubuntu-latest,  preset: static }
          - { name: "macOS · default",   os: macos-latest,   preset: default }
          - { name: "macOS · static",    os: macos-latest,   preset: static }
          - { name: "Windows · dynamic", os: windows-latest, preset: default }
          - { name: "Windows · static",  os: windows-latest, preset: static-windows }

    env:
      # Cache built vcpkg packages in the GitHub Actions cache (x-gha backend).
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4

      # Expose the tokens the vcpkg x-gha binary cache backend needs.
      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --no-progress -y

      # Put cl.exe / the MSVC toolchain on PATH so the Ninja generator finds it.
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Bootstrap vcpkg into ./.vcpkg at the manifest baseline, matching the
      # CMakePresets toolchain path. Manifest mode installs deps at configure time.
      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg .vcpkg
          baseline=$(node -p "require('./vcpkg.json')['builtin-baseline']")
          git -C .vcpkg checkout "$baseline"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./.vcpkg/bootstrap-vcpkg.bat -disableMetrics
          else
            ./.vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }}

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

      - name: Verify binary linkage
        shell: bash
        run: |
          bin="build/${{ matrix.preset }}/studio-bondage-club"
          case "$RUNNER_OS" in
            Linux)   ldd "$bin"     || true ;;
            macOS)   otool -L "$bin" || true ;;
            Windows) dumpbin //dependents "${bin}.exe" || true ;;
          esac

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: studio-bondage-club-${{ matrix.os }}-${{ matrix.preset }}
          path: |
            build/${{ matrix.preset }}/studio-bondage-club
            build/${{ matrix.preset }}/studio-bondage-club.exe
          if-no-files-found: ignore

  # React admin panel: type-check + production build.
  web:
    name: Web panel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Upload web/dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  # Android app: embeds the server core (built per-ABI via vcpkg + NDK) and the
  # web panel into a WebView APK.
  android:
    name: Android APK
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Node builds web/dist (driven by the buildWebAssets Gradle task); python3
      # (preinstalled on the runner) generates the embedded-asset translation unit.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "ndk;26.3.11579264" "cmake;3.22.1"

      # Bootstrap vcpkg into ./.vcpkg at the manifest baseline (the Android shim
      # toolchain chainloads it onto the NDK). Manifest deps build per ABI.
      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg .vcpkg
          baseline=$(node -p "require('./vcpkg.json')['builtin-baseline']")
          git -C .vcpkg checkout "$baseline"
          ./.vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: studio-bondage-club-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
